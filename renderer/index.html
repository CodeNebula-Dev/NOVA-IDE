<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova IDE</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css" />
    <script src="../node_modules/xterm/lib/xterm.js"></script>
    <script src="../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-pulse"></span>
          <h1>Nova IDE</h1>
        </div>
        <div class="workspace-controls">
          <span id="workspaceLabel" class="workspace-label"></span>
          <button id="openWorkspaceBtn" class="secondary-btn">Open Folder</button>
          <button id="refreshWorkspaceBtn" class="secondary-btn">Refresh</button>
          <button id="terminalToggleBtn" class="secondary-btn">Terminal</button>
          <button id="settingsBtn" class="secondary-btn">Settings</button>
        </div>
      </header>

      <main class="ide-grid">
        <aside class="panel panel-left">
          <div class="panel-header">
            <h2>File Manager</h2>
            <div class="panel-actions">
              <button id="newFileBtn" class="secondary-btn">+ File</button>
              <button id="newFolderBtn" class="secondary-btn">+ Folder</button>
            </div>
          </div>
          <div id="fileTree" class="file-tree"></div>
        </aside>

        <section class="panel panel-center">
          <div id="tabsBar" class="tabs-bar"></div>
          <div class="editor-shell" style="position: relative; display: flex; flex-direction: column; width: 100%; height: 100%;">
            <div id="diffControlBar" class="diff-control-bar hidden" style="display: flex; align-items: center; justify-content: space-between; background: #151a26; border: 1px solid var(--line); border-radius: 8px; padding: 6px 14px; margin: 8px; box-shadow: 0 4px 18px rgba(0,0,0,0.35); z-index: 10;">
              <span class="diff-title" style="font-weight: 700; font-size: 0.84rem; color: #fff;">⚡ Proposed Valkyrie Changes</span>
              <div class="diff-actions" style="display: flex; gap: 8px;">
                <button id="acceptDiffBtn" class="accent-btn" style="padding: 4px 10px; font-size: 0.78rem;">Accept & Commit</button>
                <button id="rejectDiffBtn" class="secondary-btn" style="padding: 4px 10px; font-size: 0.78rem; background: transparent; border-color: rgba(255,255,255,0.15);">Reject</button>
              </div>
            </div>
            <div id="monacoEditorContainer" style="flex: 1; height: 100%; width: 100%;"></div>
            <div id="monacoDiffContainer" class="hidden" style="flex: 1; height: 100%; width: 100%;"></div>
          </div>
          <div class="status-bar">
            <span id="statusLanguage">plaintext</span>
            <span id="statusCursor">Ln 1, Col 1</span>
            <span id="statusEncoding">UTF-8</span>
          </div>
        </section>

        <aside class="panel panel-right">
          <div class="panel-header">
            <h2>AI Agent</h2>
            <div class="agent-status">
              <span id="agentStatusDot" class="status-dot"></span>
              <span id="agentStatusText">Ready</span>
            </div>
          </div>

          <div class="agent-controls">
            <label>
              Provider
              <select id="providerSelect">
                <option value="pollinations">Pollinations (No Key)</option>
                <option value="openrouter">OpenRouter (Free Tier)</option>
              </select>
            </label>

            <label>
              Model
              <select id="modelSelect"></select>
            </label>

            <label>
              Mode
              <select id="modeSelect">
                <option value="chat">Chat</option>
                <option value="edit">Edit</option>
                <option value="explain">Explain</option>
                <option value="debug">Debug</option>
              </select>
            </label>

            <label id="openRouterKeyWrap" class="hidden">
              OpenRouter API Key
              <input id="openRouterKeyInput" type="password" placeholder="sk-or-..." autocomplete="off" />
            </label>

            <label id="groqKeyWrap" class="hidden">
              Groq API Key (Llama 3.3)
              <input id="groqKeyInput" type="password" placeholder="gsk_..." autocomplete="off" />
            </label>

            <p id="modelHint" class="hint-text"></p>
            <p class="context-label">
              Context file:
              <code id="contextFileLabel">No file selected</code>
            </p>
          </div>

          <div class="conversation-header">
            <span>Conversations</span>
            <button id="newConversationBtn" class="secondary-btn">+ New</button>
          </div>
          <div id="conversationList" class="conversation-list"></div>

          <div id="chatMessages" class="chat-messages"></div>

          <div class="chat-composer">
            <textarea id="agentInput" placeholder="Ask the agent to chat, edit, explain, or debug..."></textarea>
            <div class="chat-actions">
              <button id="sendAgentBtn" class="primary-btn">Send</button>
              <button id="applyToFileBtn" class="accent-btn" disabled>Apply to file</button>
            </div>
          </div>
        </aside>
      </main>

      <section id="terminalPanel" class="terminal-panel hidden">
        <div class="terminal-header">Nova Terminal (Workspace Helper)</div>
        <div id="xtermTerminalContainer" style="flex: 1; overflow: hidden; padding: 6px; background: #0a0d13;"></div>
      </section>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="closeSettingsBtn" class="secondary-btn">×</button>
        </div>
        <div class="modal-body">
          <label>
            Editor Theme
            <select id="themeSelect">
              <option value="vs-dark">Dark (Default)</option>
              <option value="vs-light">Light</option>
              <option value="hc-black">High Contrast</option>
            </select>
          </label>
          <label>
            Editor Font Size
            <select id="fontSizeSelect">
              <option value="12">12px</option>
              <option value="14" selected>14px (Default)</option>
              <option value="16">16px</option>
              <option value="18">18px</option>
              <option value="20">20px</option>
            </select>
          </label>
          <label>
            Sidebar Panel Width
            <select id="panelWidthSelect">
              <option value="250">250px (Narrow)</option>
              <option value="280" selected>280px (Default)</option>
              <option value="320">320px (Wide)</option>
              <option value="370">370px (Extra Wide)</option>
            </select>
          </label>
        </div>
        <div class="modal-footer">
          <button id="saveSettingsBtn" class="primary-btn">Save Settings</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
